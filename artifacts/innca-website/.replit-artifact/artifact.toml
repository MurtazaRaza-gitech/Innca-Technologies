kind = "web"
previewPath = "/"
title = "INNCA Technologies"
version = "1.0.0"
id = "artifacts/innca-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25909

[services.development]
run = "pnpm --filter @workspace/innca-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/innca-website", "run", "build" ]
publicDir = "artifacts/innca-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25909"
BASE_PATH = "/"
